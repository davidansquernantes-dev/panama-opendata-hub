<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panama Open Data Hub</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e8eef7);
            color: #1f2937;
        }

        header {
            background: linear-gradient(135deg, #0b3d91, #1456c3);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        nav {
            background: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            color: #0b3d91;
            font-weight: bold;
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .chart-section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-top: 40px;
        }

        .chart-wrapper {
            height: 400px; /* 🔥 IMPORTANT */
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
        }
    </style>
</head>

<body>

<header>
    <h1>Panama Open Data Hub</h1>
    <p>Explorer les données ouvertes du Panama</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#graphique">Population</a>
</nav>

<div class="container">

    <div class="chart-section" id="graphique">
        <h2 style="text-align:center;">Population du Panama</h2>

        <div class="chart-wrapper">
            <canvas id="populationChart"></canvas>
        </div>

        <p style="text-align:center; margin-top:15px;">
            Source : INEC Panama
        </p>
    </div>

</div>

<footer>
    © 2026 Panama Open Data Hub
</footer>

<script>
window.addEventListener('load', async () => {
    try {
        const response = await fetch('./data/population-total.json');
        const data = await response.json();

        const labels = data.map(d => d.year);
        const values = data.map(d => d.population);

        const ctx = document.getElementById('populationChart').getContext('2d');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Population',
                    data: values,
                    borderWidth: 3,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

    } catch (error) {
        console.error("Erreur :", error);
    }
});
</script>

</body>
</html>
