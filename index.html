<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panama Open Data Hub</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #0b3d91;
        }
        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🇵🇦 Panama Open Data Hub</h1>

    <div class="card">
        <h2>Données ouvertes</h2>
        <p>Explore les données publiques du Panama : population, économie, tourisme.</p>
    </div>

    <div class="card">
        <h2>Revue de presse</h2>
        <p>Les dernières actualités du Panama résumées automatiquement.</p>
    </div>

    <div class="card">
        <h2>Newsletter</h2>
        <p>Inscris-toi pour recevoir les mises à jour chaque semaine.</p>
        <input type="email" placeholder="Ton email">
        <button>S'inscrire</button>
    </div>

</body>
</html>
